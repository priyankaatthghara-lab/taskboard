<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskHero 🦸 | Drag & Drop Task Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;400&family=Fira+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1>TaskHero 🦸<span class="emoji-logo">✨</span></h1>
    <button id="toggle-mode" title="Toggle dark/light mode">🌙</button>
  </header>

  <main>
    <section id="add-task-area">
      <input type="text" id="task-input" placeholder="Enter a new task...">
      <button id="add-task-btn">➕ Add Task</button>
    </section>
    <div class="board" id="board">
      <div class="column" data-status="todo">
        <div class="col-header">📝 To Do</div>
        <div class="task-list" id="todo-list"></div>
      </div>
      <div class="column" data-status="doing">
        <div class="col-header">⏳ In Progress</div>
        <div class="task-list" id="doing-list"></div>
      </div>
      <div class="column" data-status="done">
        <div class="col-header">✅ Done</div>
        <div class="task-list" id="done-list"></div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
